name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build app bundle
        run: ./scripts/package_macos_app.sh

      - name: Package app bundle
        run: ditto -c -k --keepParent "dist/Hidden Character Cleaner.app" hidden-character-cleaner-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: hidden-character-cleaner-macos
          path: hidden-character-cleaner-macos.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-2025-vs2026
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release executable
        run: cargo build --release --locked

      - name: Package executable
        shell: pwsh
        run: Compress-Archive -Path target/release/hidden-character-cleaner.exe -DestinationPath hidden-character-cleaner-windows-x86_64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: hidden-character-cleaner-windows-x86_64
          path: hidden-character-cleaner-windows-x86_64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libatk-bridge2.0-dev \
            libfontconfig1-dev \
            libgtk-3-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package binary
        run: tar -czf hidden-character-cleaner-linux-x86_64.tar.gz -C target/release hidden-character-cleaner

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: hidden-character-cleaner-linux-x86_64
          path: hidden-character-cleaner-linux-x86_64.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
      - build-linux
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-artifacts
          gh run download "$GITHUB_RUN_ID" --dir release-artifacts
          find release-artifacts -mindepth 2 -type f -exec mv {} release-artifacts/ \;
          find release-artifacts -mindepth 1 -type d -empty -delete

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*
          generate_release_notes: true
